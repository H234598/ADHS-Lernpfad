name: Apply graph phase payload

on:
  push:
    branches: [agent/wissensgraph-kernmodell]
    paths:
      - '.graph-bootstrap/**'
      - '.github/workflows/apply-graph-phase.yml'

permissions:
  contents: write

concurrency:
  group: apply-graph-phase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Apply verified phase payload
        run: python3 .graph-bootstrap/apply.py
