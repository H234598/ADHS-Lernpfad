name: Temporary phase 1 self-check

on:
  push:
    branches: [agent/wissensgraph-kernmodell]
    paths:
      - '.github/workflows/phase1-selfcheck.yml'
      - '.ci-phase1-trigger'

permissions:
  contents: write

jobs:
  selfcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt -r requirements-export.txt
      - name: Run complete phase check and publish result
        env:
          RESULT: .ci-phase1-result.md
        run: |
          set +e
          overall=0
          {
            echo '# Phase-1-Selbstcheck'
            echo
            echo "Commit: $GITHUB_SHA"
            echo
          } > "$RESULT"
          check() {
            name="$1"
            shift
            log="$(mktemp)"
            if "$@" >"$log" 2>&1; then
              echo "- ✅ $name" >> "$RESULT"
            else
              code=$?
              overall=1
              echo "- ❌ $name (Exit $code)" >> "$RESULT"
              echo >> "$RESULT"
              echo '<details><summary>Log</summary>' >> "$RESULT"
              echo >> "$RESULT"
              echo '```text' >> "$RESULT"
              tail -n 100 "$log" >> "$RESULT"
              echo '```' >> "$RESULT"
              echo '</details>' >> "$RESULT"
              echo >> "$RESULT"
            fi
            rm -f "$log"
          }
          check 'pip check' python -m pip check
          check 'Whitespace' git diff --check
          check 'Python compileall' python -m compileall -q scripts
          check 'Unit-Tests' env PYTHONPATH=scripts python -m unittest discover -s tests -p 'test_*.py'
          check 'Obsidian-Links und Callouts' python scripts/validate_links.py
          check 'Literatur bauen' python scripts/build_literature.py
          check 'Bibliografie committed' bash -lc 'git diff --exit-code -- Literatur.md references.bib references.json'
          check 'Wissensgraph bauen' python scripts/build_graph.py
          check 'Kompendium validieren' python scripts/validate_compendium.py
          check 'Gesamtdokument bauen' python scripts/build_combined.py
          check 'Anki bauen' python scripts/build_anki.py
          check 'Dokumentationsquellen bauen' python scripts/build_docs.py
          check 'MkDocs strict' mkdocs build --strict
          echo >> "$RESULT"
          if [ "$overall" -eq 0 ]; then
            echo '**Gesamtergebnis: erfolgreich**' >> "$RESULT"
          else
            echo '**Gesamtergebnis: fehlgeschlagen**' >> "$RESULT"
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$RESULT"
          git commit -m 'chore: protokolliere Phase-1-Selbstcheck'
          git push origin HEAD
          exit 0
