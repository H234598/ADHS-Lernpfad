name: Build exports

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: exports-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    name: Build export artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-export.txt

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-export.txt

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Build Markdown, bibliography and Anki sources
        run: |
          python scripts/validate_links.py
          python scripts/build_literature.py
          git add --intent-to-add Literatur.md references.bib references.json
          if ! git diff --quiet -- Literatur.md references.bib references.json; then
            echo 'Generated bibliography differs from the committed files:'
            git diff -- Literatur.md references.bib references.json
            exit 1
          fi
          python scripts/build_graph.py
          python scripts/build_combined.py
          python scripts/build_anki.py
          cp references.bib references.json build/

      - name: Install Pandoc and LuaLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            pandoc \
            texlive-luatex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-lang-german \
            fonts-dejavu-core

      - name: Build EPUB HTML and LaTeX source
        run: |
          COMMON_ARGS=(
            build/ADHS-Lernpfad-Gesamtdokument.md
            --standalone
            --toc
            --citeproc
            --metadata title='ADHS-Lernpfad'
            --metadata lang='de-DE'
            --resource-path='.:figures:assets'
          )
          pandoc "${COMMON_ARGS[@]}" --output build/ADHS-Lernpfad.epub
          pandoc "${COMMON_ARGS[@]}" --output build/ADHS-Lernpfad.html
          pandoc "${COMMON_ARGS[@]}" --output build/ADHS-Lernpfad.tex

      - name: Build PDF with LuaLaTeX
        run: |
          pandoc build/ADHS-Lernpfad-Gesamtdokument.md \
            --output build/ADHS-Lernpfad.pdf \
            --standalone \
            --toc \
            --citeproc \
            --pdf-engine=lualatex \
            --metadata title='ADHS-Lernpfad' \
            --metadata lang='de-DE' \
            --variable mainfont='DejaVu Serif' \
            --variable sansfont='DejaVu Sans' \
            --variable monofont='DejaVu Sans Mono' \
            --resource-path='.:figures:assets'

      - name: Upload export artifacts
        uses: actions/upload-artifact@v7
        with:
          name: adhs-lernpfad-exports
          path: build/
          if-no-files-found: error
          retention-days: 30
