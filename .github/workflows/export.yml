name: Build exports

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: exports-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    name: Build export artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-export.txt

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-export.txt

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Build Markdown and Anki sources
        run: |
          python scripts/build_literature.py
          git diff --exit-code -- Literatur.md
          python scripts/build_graph.py
          python scripts/build_combined.py
          python scripts/build_anki.py

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends pandoc

      - name: Build EPUB and HTML exports
        run: |
          pandoc build/ADHS-Lernpfad-Gesamtdokument.md \
            --output build/ADHS-Lernpfad.epub \
            --toc \
            --metadata title='ADHS-Lernpfad'
          pandoc build/ADHS-Lernpfad-Gesamtdokument.md \
            --output build/ADHS-Lernpfad.html \
            --standalone \
            --toc \
            --metadata title='ADHS-Lernpfad'

      - name: Upload export artifacts
        uses: actions/upload-artifact@v7
        with:
          name: adhs-lernpfad-exports
          path: build/
          if-no-files-found: error
          retention-days: 30
