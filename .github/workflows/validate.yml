name: Validate compendium

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and build
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt -r requirements-export.txt

      - name: Apply unit 12 bootstrap
        id: bootstrap
        continue-on-error: true
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/einheit-12-depression-und-suizidalitaet'
        run: |
          set -o pipefail
          python .unit12-bootstrap/apply.py 2>&1 | tee bootstrap-unit-12.log
          git show origin/main:.github/workflows/validate.yml > .github/workflows/validate.yml
          git add .github/workflows/validate.yml
          if ! git diff --cached --quiet; then
            git commit -m 'chore: stelle regulären Validierungsworkflow wieder her'
            git push origin HEAD:agent/einheit-12-depression-und-suizidalitaet
          fi

      - name: Upload bootstrap diagnostic
        if: always() && steps.bootstrap.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: unit-12-bootstrap-diagnostic
          path: bootstrap-unit-12.log
          if-no-files-found: error
          retention-days: 7

      - name: Comment bootstrap diagnostic
        if: always() && steps.bootstrap.outcome == 'failure' && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Bootstrap-Diagnose für Einheit 12'
            echo
            echo '```text'
            tail -n 140 bootstrap-unit-12.log
            echo '```'
          } > /tmp/bootstrap-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/bootstrap-comment.md

      - name: Stop after bootstrap failure
        if: steps.bootstrap.outcome == 'failure'
        run: exit 1

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Check whitespace and source syntax
        run: |
          git diff --check
          python -m compileall -q scripts
          find Sync -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

      - name: Validate Obsidian links
        run: python scripts/validate_links.py

      - name: Build literature and citation exports
        run: python scripts/build_literature.py

      - name: Verify generated bibliography is committed
        run: |
          mkdir -p build
          git add --intent-to-add Literatur.md references.bib references.json
          if ! git diff --quiet -- Literatur.md references.bib references.json; then
            {
              echo '# Bibliografie-Generatorabweichung'
              echo
              echo 'Die folgenden generierten Dateien stimmen nicht mit dem Commit überein:'
              echo
              echo '```diff'
              git diff -- Literatur.md references.bib references.json
              echo '```'
            } | tee build/validation-report.txt
            exit 1
          fi

      - name: Build knowledge graph
        run: python scripts/build_graph.py

      - name: Validate compendium
        id: compendium_validation
        run: python scripts/validate_compendium.py

      - name: Show validation summary
        if: always()
        run: echo "${{ steps.compendium_validation.outputs.summary }}"

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validation-report
          path: build/validation-report.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Comment validation report
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -f build/validation-report.txt ]]; then
            jq -Rs '{body: .}' build/validation-report.txt > /tmp/comment.json
            gh api --method POST \
              repos/H234598/ADHS-Lernpfad/issues/${{ github.event.pull_request.number }}/comments \
              --input /tmp/comment.json
          fi

      - name: Fail on validation errors
        if: steps.compendium_validation.outputs.failed == 'true'
        run: |
          cat build/validation-report.txt
          exit 1

      - name: Build combined document
        run: python scripts/build_combined.py

      - name: Build Anki deck
        run: python scripts/build_anki.py

      - name: Build documentation sources
        run: python scripts/build_docs.py

      - name: Build MkDocs site strictly
        run: mkdocs build --strict

  export-smoke:
    name: Build all download formats
    if: github.event_name != 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-export.txt

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-export.txt

      - name: Build source artifacts
        run: |
          python scripts/validate_links.py
          python scripts/build_literature.py
          python scripts/build_graph.py
          python scripts/build_combined.py
          python scripts/build_anki.py

      - name: Install Pandoc and LuaLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            pandoc \
            texlive-luatex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-lang-german \
            fonts-dejavu-core

      - name: Build complete download bundle
        run: python scripts/build_exports.py

      - name: Verify expected downloads
        run: |
          test -s build/artifacts/ADHS-Lernpfad.pdf
          test -s build/artifacts/ADHS-Lernpfad.epub
          test -s build/artifacts/ADHS-Lernpfad.html
          test -s build/artifacts/ADHS-Lernpfad.tex
          test -s build/artifacts/ADHS-Lernpfad-Gesamtdokument.md
          test -s build/artifacts/ADHS-Lernpfad-Obsidian-Vault.zip
          test -s build/artifacts/ADHS-Lernpfad.apkg
          test -s build/artifacts/references.bib
          test -s build/artifacts/references.json
          test -s build/artifacts/downloads.json
          test -s build/artifacts/SHA256SUMS.txt
          cd build/artifacts
          sha256sum --check SHA256SUMS.txt

      - name: Upload preview download bundle
        uses: actions/upload-artifact@v7
        with:
          name: download-center-preview
          path: build/artifacts/
          if-no-files-found: error
          retention-days: 7
