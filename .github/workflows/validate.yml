name: Validate compendium

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and build
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -q -r requirements-docs.txt -r requirements-export.txt

      - name: Apply unit 12 bootstrap
        id: bootstrap
        continue-on-error: true
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/einheit-12-depression-und-suizidalitaet'
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.unit12-bootstrap/apply.py')
          text = path.read_text(encoding='utf-8')
          if 'import yaml\n' not in text:
              text = text.replace('import subprocess\n', 'import subprocess\nimport yaml\n', 1)
          old = '''planned = planned_path.read_text(encoding="utf-8")
          planned = re.sub(
              r"(?ms)^  - path: 01-Grundlagen/12-Komorbiditaet-Depression-und-Suizidalitaet\n(?:    .*\n)+\n?",
              "",
              planned,
              count=1,
          )
          planned_path.write_text(planned, encoding="utf-8")'''
          new = '''planned_data = yaml.safe_load(planned_path.read_text(encoding="utf-8")) or {"nodes": []}
          planned_nodes = planned_data.get("nodes", [])
          if not isinstance(planned_nodes, list):
              raise RuntimeError("knowledge-graph/planned-nodes.yaml: nodes muss eine Liste sein")
          planned_data["nodes"] = [
              item for item in planned_nodes
              if not isinstance(item, dict)
              or item.get("path") != "01-Grundlagen/12-Komorbiditaet-Depression-und-Suizidalitaet"
          ]
          planned_path.write_text(
              "# Bewusst geplante, noch nicht vorhandene Seiten.\n"
              "# Nur hier registrierte fehlende Ziele dürfen als planned veröffentlicht werden.\n"
              + yaml.safe_dump(planned_data, allow_unicode=True, sort_keys=False),
              encoding="utf-8",
          )'''
          if old not in text:
              raise RuntimeError('Planned-Node-Block im Bootstrap nicht gefunden')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          set -o pipefail
          PYTHONPATH=scripts python .unit12-bootstrap/apply.py 2>&1 | tee bootstrap-unit-12.log
          git show origin/main:.github/workflows/validate.yml > .github/workflows/validate.yml
          git add .github/workflows/validate.yml
          if ! git diff --cached --quiet; then
            git commit -m 'chore: stelle regulären Validierungsworkflow wieder her'
            git push origin HEAD:agent/einheit-12-depression-und-suizidalitaet
          fi

      - name: Publish bootstrap diagnostic in PR body
        if: always() && steps.bootstrap.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/H234598/ADHS-Lernpfad/pulls/$PR_NUMBER" --jq .body > /tmp/current-body.md
          python - <<'PY'
          from pathlib import Path
          import re
          body = Path('/tmp/current-body.md').read_text(encoding='utf-8')
          body = re.sub(r'\n?<!-- bootstrap-diagnostic:start -->.*?<!-- bootstrap-diagnostic:end -->\n?', '\n', body, flags=re.S)
          log = Path('bootstrap-unit-12.log').read_text(encoding='utf-8', errors='replace').splitlines()
          diagnostic = '\n\n<!-- bootstrap-diagnostic:start -->\n## Aktuelle Bootstrap-Diagnose\n\n```text\n' + '\n'.join(log[-80:]) + '\n```\n<!-- bootstrap-diagnostic:end -->\n'
          Path('/tmp/updated-body.md').write_text(body.rstrip() + diagnostic, encoding='utf-8')
          PY
          jq -Rs '{body: .}' /tmp/updated-body.md > /tmp/pr-body.json
          gh api --method PATCH "repos/H234598/ADHS-Lernpfad/pulls/$PR_NUMBER" --input /tmp/pr-body.json

      - name: Stop after bootstrap failure
        if: steps.bootstrap.outcome == 'failure'
        run: exit 1

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Check whitespace and source syntax
        run: |
          git diff --check
          python -m compileall -q scripts
          find Sync -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

      - name: Validate Obsidian links
        run: python scripts/validate_links.py

      - name: Build literature and citation exports
        run: python scripts/build_literature.py

      - name: Verify generated bibliography is committed
        run: |
          mkdir -p build
          git add --intent-to-add Literatur.md references.bib references.json
          if ! git diff --quiet -- Literatur.md references.bib references.json; then
            {
              echo '# Bibliografie-Generatorabweichung'
              echo
              echo 'Die folgenden generierten Dateien stimmen nicht mit dem Commit überein:'
              echo
              echo '```diff'
              git diff -- Literatur.md references.bib references.json
              echo '```'
            } | tee build/validation-report.txt
            exit 1
          fi

      - name: Build knowledge graph
        run: python scripts/build_graph.py

      - name: Validate compendium
        id: compendium_validation
        run: python scripts/validate_compendium.py

      - name: Show validation summary
        if: always()
        run: echo "${{ steps.compendium_validation.outputs.summary }}"

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validation-report
          path: build/validation-report.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Comment validation report
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -f build/validation-report.txt ]]; then
            jq -Rs '{body: .}' build/validation-report.txt > /tmp/comment.json
            gh api --method POST \
              repos/H234598/ADHS-Lernpfad/issues/${{ github.event.pull_request.number }}/comments \
              --input /tmp/comment.json
          fi

      - name: Fail on validation errors
        if: steps.compendium_validation.outputs.failed == 'true'
        run: |
          cat build/validation-report.txt
          exit 1

      - name: Build combined document
        run: python scripts/build_combined.py

      - name: Build Anki deck
        run: python scripts/build_anki.py

      - name: Build documentation sources
        run: python scripts/build_docs.py

      - name: Build MkDocs site strictly
        run: mkdocs build --strict

  export-smoke:
    name: Build all download formats
    if: github.event_name != 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-export.txt

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-export.txt

      - name: Build source artifacts
        run: |
          python scripts/validate_links.py
          python scripts/build_literature.py
          python scripts/build_graph.py
          python scripts/build_combined.py
          python scripts/build_anki.py

      - name: Install Pandoc and LuaLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            pandoc \
            texlive-luatex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-lang-german \
            fonts-dejavu-core

      - name: Build complete download bundle
        run: python scripts/build_exports.py

      - name: Verify expected downloads
        run: |
          test -s build/artifacts/ADHS-Lernpfad.pdf
          test -s build/artifacts/ADHS-Lernpfad.epub
          test -s build/artifacts/ADHS-Lernpfad.html
          test -s build/artifacts/ADHS-Lernpfad.tex
          test -s build/artifacts/ADHS-Lernpfad-Gesamtdokument.md
          test -s build/artifacts/ADHS-Lernpfad-Obsidian-Vault.zip
          test -s build/artifacts/ADHS-Lernpfad.apkg
          test -s build/artifacts/references.bib
          test -s build/artifacts/references.json
          test -s build/artifacts/downloads.json
          test -s build/artifacts/SHA256SUMS.txt
          cd build/artifacts
          sha256sum --check SHA256SUMS.txt

      - name: Upload preview download bundle
        uses: actions/upload-artifact@v7
        with:
          name: download-center-preview
          path: build/artifacts/
          if-no-files-found: error
          retention-days: 7
