name: Validate compendium

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Generate and validate unit 12
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout current unit branch
        uses: actions/checkout@v7
        with:
          ref: agent/einheit-12-depression-und-suizidalitaet
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -q -r requirements-docs.txt -r requirements-export.txt

      - name: Apply unit 12 and all required checks
        id: bootstrap
        continue-on-error: true
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/einheit-12-depression-und-suizidalitaet'
        run: |
          rm -f bootstrap-diagnostic.txt bootstrap-failed-command.txt
          python - <<'PY'
          from pathlib import Path
          path = Path('.unit12-bootstrap/apply.py')
          text = path.read_text(encoding='utf-8')
          if 'import yaml\n' not in text:
              text = text.replace('import subprocess\n', 'import subprocess\nimport yaml\n', 1)
          old = '''planned = planned_path.read_text(encoding="utf-8")
          planned = re.sub(
              r"(?ms)^  - path: 01-Grundlagen/12-Komorbiditaet-Depression-und-Suizidalitaet\n(?:    .*\n)+\n?",
              "",
              planned,
              count=1,
          )
          planned_path.write_text(planned, encoding="utf-8")'''
          new = '''planned_data = yaml.safe_load(planned_path.read_text(encoding="utf-8")) or {"nodes": []}
          planned_nodes = planned_data.get("nodes", [])
          if not isinstance(planned_nodes, list):
              raise RuntimeError("knowledge-graph/planned-nodes.yaml: nodes muss eine Liste sein")
          planned_data["nodes"] = [
              item for item in planned_nodes
              if not isinstance(item, dict)
              or item.get("path") != "01-Grundlagen/12-Komorbiditaet-Depression-und-Suizidalitaet"
          ]
          planned_path.write_text(
              "# Bewusst geplante, noch nicht vorhandene Seiten.\n"
              "# Nur hier registrierte fehlende Ziele dürfen als planned veröffentlicht werden.\n"
              + yaml.safe_dump(planned_data, allow_unicode=True, sort_keys=False),
              encoding="utf-8",
          )'''
          if old not in text:
              raise RuntimeError('Planned-Node-Block im Bootstrap nicht gefunden')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          set -o pipefail
          PYTHONPATH=scripts python .unit12-bootstrap/apply.py 2>&1 | tee bootstrap-unit-12.log
          git show origin/main:.github/workflows/validate.yml > .github/workflows/validate.yml
          git add .github/workflows/validate.yml
          if ! git diff --cached --quiet; then
            git commit -m 'chore: stelle regulären Validierungsworkflow wieder her'
            git push origin HEAD:agent/einheit-12-depression-und-suizidalitaet
          fi

      - name: Prepare compact diagnostic
        id: diagnostic
        if: steps.bootstrap.outcome == 'failure'
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          log_path = Path('bootstrap-unit-12.log')
          lines = log_path.read_text(encoding='utf-8', errors='replace').splitlines() if log_path.exists() else []
          Path('bootstrap-diagnostic.txt').write_text('\n'.join(lines[-160:]) + ('\n' if lines else 'Kein Bootstrap-Log erzeugt.\n'), encoding='utf-8')
          source = 'runtime-' + '-'.join(lines[-3:]) if lines else 'runtime-patch-failed-before-log'
          slug = re.sub(r'[^A-Za-z0-9._-]+', '-', source).strip('-')[:180] or 'unknown-error'
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'slug={slug}\n')
          PY

      - name: Upload diagnostic
        if: steps.bootstrap.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: unit12-${{ steps.diagnostic.outputs.slug }}
          path: bootstrap-diagnostic.txt
          if-no-files-found: error
          retention-days: 7

      - name: Fail if generation failed
        if: steps.bootstrap.outcome == 'failure'
        run: exit 1
