name: Validate compendium
on: [push, pull_request]
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements-docs.txt -r requirements-export.txt
      - run: python3 scripts/build_literature.py
      - run: python3 scripts/build_graph.py
      - id: compendium_validation
        continue-on-error: true
        run: python3 scripts/validate_compendium.py
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: build/validation-report.txt
      - name: Comment validation report
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file build/validation-report.txt
      - name: Fail on validation errors
        if: steps.compendium_validation.outcome == 'failure'
        run: |
          cat build/validation-report.txt
          exit 1
      - run: python3 scripts/build_combined.py
      - run: python3 scripts/build_anki.py
      - run: python3 scripts/build_docs.py
      - run: mkdocs build --strict
