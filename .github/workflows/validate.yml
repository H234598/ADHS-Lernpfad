name: Validate compendium

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and build
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm

      - name: Run complete validation pipeline
        id: pipeline
        continue-on-error: true
        shell: bash
        env:
          RUNTIME_STATUS_MANAGED: '1'
        run: |
          set -Eeuo pipefail
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH" >> "$GITHUB_ENV"
          python scripts/runtime_status_cli.py build/runtime-status.json \
            --new-run --workflow validate-graph-and-build \
            --run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" --git-sha "$GITHUB_SHA"
          current_phase=initialization
          fail_pipeline() {
            code=$?
            trap - ERR
            existing_status="$(python -c 'import json; print(json.load(open("build/runtime-status.json", encoding="utf-8")).get("status", ""))' 2>/dev/null || true)"
            if [[ "$existing_status" != 'failed' ]]; then
              python scripts/runtime_status_cli.py build/runtime-status.json \
                --finish failed --phase "$current_phase" --error-class ci_pipeline_error \
                --error-message "Validierung fehlgeschlagen (Exit ${code}); siehe Schrittprotokoll." \
                --recovery-action inspect_validation_logs || true
            fi
            exit "$code"
          }
          trap fail_pipeline ERR

          python -m pip install --disable-pip-version-check \
            -r requirements-docs.txt -r requirements-export.txt
          python -m pip check
          npm ci
          npx playwright install --with-deps chromium

          git diff --check
          python -m compileall -q scripts tests
          find Sync -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
          pwsh -NoProfile -Command '
            $failed = $false
            Get-ChildItem Sync -Recurse -Filter *.ps1 | ForEach-Object {
              $tokens = $null
              $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                $_.FullName, [ref]$tokens, [ref]$errors
              ) | Out-Null
              if ($errors.Count -gt 0) {
                $failed = $true
                Write-Host "PowerShell-Parserfehler in $($_.FullName):"
                $errors | ForEach-Object { Write-Host "  $($_.Message)" }
              }
            }
            if ($failed) { exit 1 }
          '
          bash Sync/tests/test-posix-sync.sh 2>&1 | tee build/sync-test.log

          RUNTIME_STATUS_MANAGED=0 python -m pytest -q
          npm test
          current_phase=load_content
          python scripts/build_literature.py
          git add --intent-to-add Literatur.md references.bib references.json
          git diff --exit-code -- Literatur.md references.bib references.json
          python scripts/build_graph.py --status-file build/runtime-status.json
          current_phase=validate_graph
          python scripts/validate_graph.py --expected-revision "$GITHUB_SHA"
          python scripts/validate_links.py
          python scripts/validate_compendium.py
          current_phase=export
          python scripts/build_combined.py --status-file build/runtime-status.json
          python scripts/build_anki.py
          python scripts/runtime_status_cli.py build/runtime-status.json \
            --finish success --phase success
          python scripts/validate_runtime_status.py build/runtime-status.json
          python scripts/build_docs.py
          mkdocs build --strict
          npm run test:web
          python scripts/runtime_status_cli.py build/runtime-status.json \
            --finish success --phase success --artifact site
          python scripts/validate_runtime_status.py build/runtime-status.json

      - name: Build diagnostic web preview after a failed gate
        if: always() && steps.pipeline.outcome != 'success'
        continue-on-error: true
        env:
          KNOWLEDGE_GRAPH_DIAGNOSTIC: '1'
        run: |
          python scripts/build_docs.py
          mkdocs build --strict --site-dir build/diagnostic-site

      - name: Create graph CI summary
        if: always()
        run: python scripts/graph_ci_summary.py

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validation-and-graph-diagnostics-${{ github.run_attempt }}
          path: |
            build/runtime-status.json
            build/runtime-status-validation-report.json
            build/runtime-status-validation-report.md
            build/graph-ci-summary.md
            build/knowledge-graph/
            build/validation-report.txt
            build/sync-test.log
            build/playwright-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload knowledge-graph web preview
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: knowledge-graph-web-preview-${{ github.run_attempt }}
          path: |
            site/
            build/diagnostic-site/
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce validation result
        if: always()
        shell: bash
        run: |
          if [[ '${{ steps.pipeline.outcome }}' != 'success' ]]; then
            cat build/runtime-status.json 2>/dev/null || true
            exit 1
          fi

  comment:
    name: Update pull-request summary
    if: always() && github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
      issues: write

    steps:
      - name: Download validation diagnostics
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: validation-and-graph-diagnostics-${{ github.run_attempt }}
          path: build

      - name: Update idempotent summary comment
        if: always()
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          marker='<!-- adhs-graph-ci-summary -->'
          {
            echo "$marker"
            if [[ -f build/graph-ci-summary.md ]]; then
              cat build/graph-ci-summary.md
            else
              echo '# Wissensgraph CI-Zusammenfassung'
              echo
              echo 'Die Diagnosezusammenfassung konnte nicht erzeugt werden.'
            fi
          } > build/pr-comment.md
          comment_id="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"${marker}\"))) | .id" | head -n1)"
          jq -Rs '{body: .}' build/pr-comment.md > build/pr-comment.json
          if [[ -n "$comment_id" ]]; then
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              --input build/pr-comment.json
          else
            gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --input build/pr-comment.json
          fi

  export-smoke:
    name: Build all download formats
    if: github.event_name != 'push'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt

      - name: Build and verify complete download bundle
        id: export
        continue-on-error: true
        shell: bash
        env:
          RUNTIME_STATUS_MANAGED: '1'
        run: |
          set -Eeuo pipefail
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          python scripts/runtime_status_cli.py build/runtime-status.json \
            --new-run --workflow export-smoke \
            --run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-export" --git-sha "$GITHUB_SHA"
          current_phase=initialization
          fail_export() {
            code=$?
            trap - ERR
            existing_status="$(python -c 'import json; print(json.load(open("build/runtime-status.json", encoding="utf-8")).get("status", ""))' 2>/dev/null || true)"
            if [[ "$existing_status" != 'failed' ]]; then
              python scripts/runtime_status_cli.py build/runtime-status.json \
                --finish failed --phase "$current_phase" --error-class export_ci_error \
                --error-message "Exporttest fehlgeschlagen (Exit ${code}); siehe Schrittprotokoll." \
                --recovery-action inspect_export_logs || true
            fi
            exit "$code"
          }
          trap fail_export ERR
          python -m pip install --disable-pip-version-check \
            -r requirements-docs.txt -r requirements-export.txt
          python -m pip check
          current_phase=load_content
          python scripts/build_literature.py
          git diff --exit-code -- Literatur.md references.bib references.json
          python scripts/build_graph.py --status-file build/runtime-status.json
          current_phase=validate_graph
          python scripts/validate_graph.py --expected-revision "$GITHUB_SHA"
          python scripts/validate_links.py
          python scripts/validate_compendium.py
          current_phase=export
          python scripts/build_combined.py --status-file build/runtime-status.json
          python scripts/build_anki.py
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            pandoc texlive-luatex texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-lang-german fonts-dejavu-core
          python scripts/build_exports.py --status-file build/runtime-status.json
          python scripts/runtime_status_cli.py build/runtime-status.json \
            --finish success --phase success
          python scripts/validate_runtime_status.py build/runtime-status.json
          python scripts/build_exports.py --refresh-manifest \
            --status-file build/runtime-status.json
          (cd build/artifacts && sha256sum --check SHA256SUMS.txt)

      - name: Create export summary
        if: always()
        run: python scripts/graph_ci_summary.py

      - name: Upload preview download bundle
        if: steps.export.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: download-center-preview-${{ github.run_attempt }}
          path: build/artifacts/
          if-no-files-found: error
          retention-days: 7

      - name: Upload export diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: export-diagnostics-${{ github.run_attempt }}
          path: |
            build/runtime-status.json
            build/runtime-status-validation-report.json
            build/runtime-status-validation-report.md
            build/graph-ci-summary.md
            build/knowledge-graph/
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce export result
        if: always()
        run: test '${{ steps.export.outcome }}' = 'success'
