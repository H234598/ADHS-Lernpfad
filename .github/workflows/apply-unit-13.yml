name: Apply unit 13

on:
  push:
    branches: [agent/einheit-13-pharmakologie-psychotherapie]
    paths:
      - '.unit-13-bootstrap/**'
      - '.github/workflows/apply-unit-13.yml'

permissions:
  contents: write

concurrency:
  group: apply-unit-13-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt
      - name: Install project dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt -r requirements-export.txt
      - name: Apply, verify and commit unit 13
        run: python3 .unit-13-bootstrap/apply.py
