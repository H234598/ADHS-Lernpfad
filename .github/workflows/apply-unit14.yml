name: Apply unit 14

on:
  push:
    branches: [agent/einheit-14-autismus-adhs-koexistenz]
    paths:
      - '.unit14/**'
      - '.github/workflows/apply-unit14.yml'

permissions:
  contents: write

concurrency:
  group: apply-unit14-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt -r requirements-export.txt
      - name: Generate, validate, commit and push unit 14
        run: python3 .unit14/apply.py
