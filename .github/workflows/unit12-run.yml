name: Unit 12 final repository checks

on:
  push:
    branches: [agent/einheit-12-komorbiditaet-depression-suizidalitaet]
    paths:
      - '.unit12-run/**'

permissions:
  contents: write

concurrency:
  group: unit12-final-${{ github.ref }}
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt -r requirements-export.txt
      - name: Generate, validate, commit and push
        run: python .unit12-run/run.py
