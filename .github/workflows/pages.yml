name: Publish documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages and download artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt -r requirements-export.txt

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Validate links and build source artifacts
        run: |
          python scripts/validate_links.py
          python scripts/build_literature.py
          git add --intent-to-add Literatur.md references.bib references.json
          git diff --exit-code -- Literatur.md references.bib references.json
          python scripts/build_graph.py
          python scripts/build_combined.py
          python scripts/build_anki.py

      - name: Install Pandoc and LuaLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            pandoc \
            texlive-luatex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-lang-german \
            fonts-dejavu-core

      - name: Build stable website downloads
        run: python scripts/build_exports.py

      - name: Build documentation sources
        run: python scripts/build_docs.py

      - name: Build MkDocs site strictly
        run: mkdocs build --strict

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
