name: Vendor pinned Cytoscape

on:
  push:
    branches: [agent/wissensgraph-wartungssektion]
    paths:
      - '.vendor-cytoscape/**'
      - '.github/workflows/vendor-cytoscape.yml'

permissions:
  contents: write

concurrency:
  group: vendor-cytoscape-${{ github.ref }}
  cancel-in-progress: false

jobs:
  vendor:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Fetch and verify Cytoscape 3.34.0
        shell: bash
        run: |
          set -Eeuo pipefail
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          cd "$work"
          package_name="$(npm pack cytoscape@3.34.0 --silent)"
          tar -xzf "$package_name"
          test "$(node -p "require('./package/package.json').version")" = "3.34.0"
          test "$(git hash-object package/dist/cytoscape.min.js)" = "be225eadd48edf7c73acb85355af12bfc929556e"
          test "$(git hash-object package/LICENSE)" = "aac05f201cb14147da8c5ffcbc56ddbf9c954ccc"

          vendor="$GITHUB_WORKSPACE/assets/vendor/cytoscape"
          mkdir -p "$vendor"
          cp package/dist/cytoscape.min.js "$vendor/cytoscape.min.js"
          cp package/LICENSE "$vendor/LICENSE"
          printf '3.34.0\n' > "$vendor/VERSION.txt"
          cat > "$vendor/SOURCE.txt" <<'EOF'
          Package: cytoscape@3.34.0
          Upstream tag: v3.34.0
          Upstream repository: cytoscape/cytoscape.js
          Upstream Git blob (cytoscape.min.js): be225eadd48edf7c73acb85355af12bfc929556e
          Upstream Git blob (LICENSE): aac05f201cb14147da8c5ffcbc56ddbf9c954ccc
          EOF
          (
            cd "$vendor"
            sha256sum cytoscape.min.js LICENSE VERSION.txt SOURCE.txt > SHA256SUMS.txt
            sha256sum --check SHA256SUMS.txt
          )
      - name: Apply local dependency wiring
        run: python3 .vendor-cytoscape/apply.py
      - name: Verify source changes
        shell: bash
        run: |
          set -Eeuo pipefail
          git diff --check
          node --check assets/vendor/cytoscape/cytoscape.min.js
          node --check assets/javascripts/knowledge-graph.js
          python -m compileall -q scripts tests
          python -m unittest discover -s tests -p 'test_*.py'
      - name: Commit vendored dependency
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          git diff --cached --quiet && exit 0
          git commit -m 'Vendor Cytoscape 3.34.0 locally'
          git push origin HEAD
