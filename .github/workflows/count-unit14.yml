name: Verify unit 14 word count

on:
  push:
    branches: [agent/einheit-14-autismus-adhs-koexistenz]
    paths: ['.github/workflows/count-unit14.yml']

permissions:
  contents: write

jobs:
  count:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Count, remove helper and record result
        shell: bash
        run: |
          set -euo pipefail
          count=$(python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('02-Vertiefung/02-Autismus-und-ADHS-Ueberlappung.md').read_text(encoding='utf-8')
          text = re.sub(r'\A---\n.*?\n---\n', '', text, flags=re.S)
          text = re.sub(r'```.*?```', '', text, flags=re.S)
          text = re.sub(r'</?(?:details|summary)>', '', text)
          text = re.sub(r'## Navigation.*\Z', '', text, flags=re.S)
          text = re.sub(r'\[\[([^\]|]+)(?:\|([^\]]+))?\]\]', lambda m: m.group(2) or m.group(1), text)
          print(len(re.findall(r"\b[\wÄÖÜäöüß]+(?:[-’'][\wÄÖÜäöüß]+)*\b", text)))
          PY
          )
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/count-unit14.yml
          git commit -m "chore: verified unit 14 word count ${count}"
          git push origin HEAD:agent/einheit-14-autismus-adhs-koexistenz
