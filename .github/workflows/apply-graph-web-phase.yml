name: Apply and verify knowledge graph web phase

on:
  push:
    branches: [agent/wissensgraph-web]
    paths:
      - '.graph-web-bootstrap/**'
      - '.github/workflows/apply-graph-web-phase.yml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.graph-web-bootstrap/**'
      - '.github/workflows/apply-graph-web-phase.yml'

permissions:
  contents: write

concurrency:
  group: graph-web-bootstrap-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Apply phase payload, vendor Cytoscape and generate lockfile
        run: python3 .graph-web-bootstrap/apply.py

      - name: Install project dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements-docs.txt -r requirements-export.txt
          npm ci
          npx playwright install --with-deps chromium

      - name: Run source, graph and documentation checks
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build
          {
            python -m pip check
            git diff --check
            python -m compileall -q scripts tests
            node --check assets/javascripts/knowledge-graph.js
            python -m unittest discover -s tests -p 'test_*.py'
            python scripts/build_literature.py
            git diff --exit-code -- Literatur.md references.bib references.json
            python scripts/build_graph.py
            python scripts/validate_links.py
            python scripts/validate_compendium.py
            python scripts/build_combined.py
            python scripts/build_anki.py
            python scripts/build_docs.py
            mkdocs build --strict
            npm run test:web
          } 2>&1 | tee build/phase2-check.log

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: graph-web-phase-diagnostics
          path: build/phase2-check.log
          if-no-files-found: warn
          retention-days: 7

      - name: Commit verified phase
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          git diff --cached --quiet && exit 0
          git commit -m 'feat: vervollständige Wissensgraph-Weboberfläche'
          git push origin HEAD
