name: Finalize unit 12

on:
  push:
    branches: [agent/einheit-12-komorbiditaet-depression-suizidalitaet]
    paths:
      - '.unit12-finalize/**'
      - '.github/workflows/finalize-unit-12.yml'

permissions:
  contents: write

concurrency:
  group: finalize-unit-12-${{ github.ref }}
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-export.txt
      - name: Install project dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt -r requirements-export.txt
      - name: Apply final content updates and run all checks
        run: python .unit12-finalize/apply.py
