site_name: ADHS-Lernpfad
site_description: Wissenschaftlich fundierter Lernpfad zu ADHS
repo_url: https://github.com/H234598/ADHS-Lernpfad
edit_uri: edit/main/
docs_dir: build/docs
site_dir: site
strict: true
theme:
  name: material
  language: de
  features: [navigation.instant, navigation.sections, navigation.top, search.highlight, content.code.copy]
plugins:
  - search:
      lang: de
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Start: README.md
  - Einführung: 00-Einfuehrung.md
  - Grundlagen:
      - Was ist ADHS?: 01-Grundlagen/01-Was-ist-ADHS.md
      - Inhibition: 01-Grundlagen/02-Inhibition-und-Handlungssteuerung.md
      - Dopamin und Motivation: 01-Grundlagen/03-Dopamin-Belohnung-und-Motivation.md
      - Arbeitsgedächtnis: 01-Grundlagen/04-Arbeitsgedaechtnis.md
      - Aufmerksamkeit: 01-Grundlagen/05-Aufmerksamkeit-und-Stabilitaet.md
      - Zeitverarbeitung: 01-Grundlagen/06-Zeitverarbeitung.md
      - Emotionsregulation: 01-Grundlagen/07-Emotionsregulation.md
      - Neuroentwicklung und Lebensspanne: 01-Grundlagen/08-Neuroentwicklung-und-Lebensspanne.md
  - Wissenssystem:
      - Glossar: Glossar.md
      - Literatur: Literatur.md
      - Studienkarten: references/README.md
      - Wissensgraph: knowledge-graph/README.md
      - Anki: cards/README.md
      - Abbildungen: figures/README.md
  - Roadmap: ROADMAP.md
