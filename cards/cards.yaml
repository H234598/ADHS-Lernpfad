deck: ADHS-Lernpfad
cards:
- id: 1001
  unit: 1
  front: Warum ist „Menschen mit ADHS können sich nicht konzentrieren“ ungenau?
  back: Weil Konzentration möglich sein kann, ihre zuverlässige Steuerung aber stark von Aufgabe, Motivation,
    Reizlage und Kontext abhängt.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_01
- id: 1002
  unit: 2
  front: Warum kann eine Person eine Regel kennen und sie trotzdem nicht rechtzeitig umsetzen?
  back: Weil Wissen nur dann Verhalten steuert, wenn es im Moment aktiv bleibt und konkurrierende Reaktionen
    gehemmt werden.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_02
- id: 1003
  unit: 3
  front: Warum reicht die langfristige Wichtigkeit einer Aufgabe oft nicht zum Start?
  back: Weil Wissen über spätere Folgen nicht automatisch ein starkes gegenwärtiges Handlungssignal erzeugt.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_03
- id: 1004
  unit: 4
  front: Warum kann eine bekannte Aufgabe nach einer Unterbrechung plötzlich schwer fortzusetzen sein?
  back: Weil Ziel und Zwischenschritt aus dem aktiven Arbeitsgedächtnis verschwunden sein können.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_04
- id: 1005
  unit: 5
  front: Wie kann eine Person zeitweise ausgezeichnete Leistung und dennoch relevante Aufmerksamkeitsprobleme
    haben?
  back: Weil die Schwierigkeit in Stabilität und Koordination liegen kann, nicht in einer konstanten Unfähigkeit.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_05
- id: 1006
  unit: 6
  front: Warum ist „schlechte innere Uhr“ als Erklärung unzureichend?
  back: Weil zeitgerechtes Verhalten aus mehreren kognitiven und motivationalen Systemen entsteht.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_06
- id: 1007
  unit: 7
  front: Warum ist emotionale Dysregulation nicht dasselbe wie starke Gefühle?
  back: Weil auch Geschwindigkeit, Dauer, Erholung und zielgerechtes Handeln unter Belastung zählen.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_07
- id: 1008
  unit: 8
  front: Warum ist „ADHS ausgewachsen – ja oder nein?“ als Verlaufsfrage zu grob?
  back: Weil Symptome, Beeinträchtigung, Unterstützung und Anforderungen sich unabhängig verändern können
    und Remission zeitweise oder teilweise sein kann.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_08
- id: 1009
  unit: 9
  front: Warum kann ein positiver ADHS-Fragebogen die Diagnose nicht allein entscheiden?
  back: Weil Screeningwerte nur einen Ausschnitt erfassen; die Diagnose zusätzlich Entwicklungsgeschichte,
    mehrere Lebensbereiche, Funktionsbeeinträchtigung sowie Komorbiditäten und Alternativerklärungen prüfen
    muss.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_09
- id: 1010
  unit: 10
  front: Warum bedeutet eine hohe Heritabilität von ADHS kein genetisches Schicksal?
  back: Weil Heritabilität Unterschiede in einer untersuchten Population beschreibt, nicht den genetischen
    Anteil einer einzelnen Person; Entwicklung und Beeinträchtigung bleiben von Umwelt, Unterstützung
    und weiteren Bedingungen beeinflusst.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_10
- id: 1011
  unit: 11
  front: Warum sollte Schlaf bei ADHS geprüft werden, ohne ADHS auf Schlafmangel zu reduzieren?
  back: Weil Schlafmangel und Schlafstörungen ADHS-ähnliche Beschwerden erzeugen oder bestehende Symptome
    verstärken können, während die ADHS-Diagnose ein früh beginnendes, situationsübergreifendes Entwicklungs-
    und Beeinträchtigungsmuster voraussetzt.
  tags:
  - ADHS
  - Grundlagen
  - Schlaf
  - Einheit_11
- id: 1012
  unit: 12
  front: Warum erlaubt ein erhöhtes Suizidrisiko bei ADHS keine individuelle Vorhersage?
  back: Weil der Gruppenbefund viele unterschiedliche Verläufe zusammenfasst; die aktuelle Gefahr muss
    anhand konkreter Gedanken, Absicht und Planung, früherer Versuche, Komorbiditäten, Belastungen und
    verfügbarer Unterstützung individuell beurteilt werden.
  tags:
  - ADHS
  - Grundlagen
  - Depression
  - Suizidalität
  - Einheit_12
- id: 1013
  unit: 13
  front: Warum ist ‚Medikament oder Psychotherapie – was ist besser?‘ für ADHS zu grob?
  back: Weil Medikamente, psychologische Verfahren und Umfeldanpassungen unterschiedliche Ziele adressieren;
    Auswahl und Kombination richten sich nach Alter, Beeinträchtigung, Begleiterkrankungen, Präferenzen,
    Nebenwirkungen und beobachtbaren Alltagszielen.
  tags:
  - ADHS
  - Vertiefung
  - Behandlung
  - Einheit_13
- id: 1014
  unit: 14
  front: Warum bedeutet die sichtbare Überlappung von ADHS und Autismus nicht, dass beide dieselbe Störung sind?
  back: Weil ähnliche Verhaltensweisen unterschiedliche Funktionen und Entwicklungswege haben können; für jede Diagnose müssen ihre eigenen Kernmerkmale, Entwicklung, Kontexte und Beeinträchtigungen geprüft werden.
  tags:
  - ADHS
  - Autismus
  - Vertiefung
  - Differentialdiagnostik
  - Einheit_14
