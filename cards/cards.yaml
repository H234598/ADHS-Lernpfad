deck: ADHS-Lernpfad
cards:
- id: 1001
  unit: 1
  front: Warum ist „Menschen mit ADHS können sich nicht konzentrieren“ ungenau?
  back: Weil Konzentration möglich sein kann, ihre zuverlässige Steuerung aber stark von Aufgabe, Motivation,
    Reizlage und Kontext abhängt.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_01
- id: 1002
  unit: 2
  front: Warum kann eine Person eine Regel kennen und sie trotzdem nicht rechtzeitig umsetzen?
  back: Weil Wissen nur dann Verhalten steuert, wenn es im Moment aktiv bleibt und konkurrierende Reaktionen
    gehemmt werden.
  tags:
  - ADHS
  - Grundlagen
  - Einheit_02
- id: 1015
  unit: 15
  front: Warum bedeuten gemeinsame Begriffe wie Dopamin nicht, dass ADHS und Parkinson dieselbe Erkrankung sind?
  back: Weil Dopamin in unterschiedlichen neuronalen Netzwerken unterschiedliche Funktionen erfüllt und sich Ursachen,
    Entwicklungsverlauf und biologische Prozesse beider Erkrankungen unterscheiden.
  tags:
  - ADHS
  - Parkinson
  - Einheit_15
